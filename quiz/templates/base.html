<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f7f6; }
        .card { border-radius: 20px; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; }
        .navbar { background: linear-gradient(to right, #4e54c8, #8f94fb); }

        /* Tugmalar uchun gradient */
.btn-primary {
    background: linear-gradient(to right, #6a11cb, #2575fc);
    border: none;
    padding: 12px 25px;
    border-radius: 50px;
}

/* Kartalar uchun shadow */
.shadow {
    box-shadow: 0 4px 15px rgba(0,0,0,0.1) !important;
}

/* Jadvalni chiroyli qilish */
.table thead {
    background-color: #343a40;
    color: white;
}
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">MyQuiz Pro</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
