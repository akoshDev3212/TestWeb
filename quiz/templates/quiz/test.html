<!DOCTYPE html>
<html lang="uz">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>{{ category }} Testi</title>
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">{{ category }} Testi</h3>
        </div>
        
        <div class="progress" style="height: 10px;">
            <div id="progressBar" class="progress-bar bg-success" role="progressbar" style="width: 0%;"></div>
        </div>

        <div class="card-body">
            <form method="POST" id="quizForm">
                {% csrf_token %}
                <input type="hidden" name="user_name" value="{{ user.username }}">
                
                {% for q in questions %}
                <div class="mb-4 p-3 border rounded shadow-sm">
                    <h5>{{ forloop.counter }}. {{ q.question_text }}</h5>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="question_{{ q.id }}" value="{{ q.option1 }}" id="q{{q.id}}a1" required>
                        <label class="form-check-label" for="q{{q.id}}a1">{{ q.option1 }}</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="question_{{ q.id }}" value="{{ q.option2 }}" id="q{{q.id}}a2">
                        <label class="form-check-label" for="q{{q.id}}a2">{{ q.option2 }}</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="question_{{ q.id }}" value="{{ q.option3 }}" id="q{{q.id}}a3">
                        <label class="form-check-label" for="q{{q.id}}a3">{{ q.option3 }}</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="question_{{ q.id }}" value="{{ q.option4 }}" id="q{{q.id}}a4">
                        <label class="form-check-label" for="q{{q.id}}a4">{{ q.option4 }}</label>
                    </div>
                </div>
                {% endfor %}
                
                <button type="submit" class="btn btn-success btn-lg w-100">Testni Yakunlash</button>
            </form>
        </div>
    </div>
</div>

<script>
    // 1. Anti-Cheat: Sahifadan chiqib ketsa testni jo'natish
    document.addEventListener("visibilitychange", function() {
        if (document.hidden) {
            alert("Diqqat! Testdan chiqib ketish taqiqlanadi. Natijalaringiz bazaga yuborildi!");
            document.getElementById("quizForm").submit();
        }
    });

    // 2. Progress Bar logikasi
    const inputs = document.querySelectorAll('input[type="radio"]');
    const totalQuestions = {{ questions.count }};
    let answered = new Set();

    inputs.forEach(input => {
        input.addEventListener('change', () => {
            answered.add(input.name);
            let progress = (answered.size / totalQuestions) * 100;
            document.getElementById('progressBar').style.width = progress + "%";
        });
    });

    // 3. O'ng tugmani taqiqlash
    document.addEventListener("contextmenu", event => event.preventDefault());
</script>

</body>
</html>
